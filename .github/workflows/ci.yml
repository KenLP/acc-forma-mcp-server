name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager". Setting `version` here too makes
      # action-setup abort with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Push to main only. The live steps are additionally gated on APS credentials being
    # present — `secrets` is not available in a job-level `if:`, so the check has to be a
    # step. Without credentials (fork, clone, or an unconfigured environment) the job is a
    # no-op and stays green rather than failing on every push.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: integration
    env:
      INTEGRATION: 'true'
      INTEGRATION_HUB_ID: ${{ secrets.INTEGRATION_HUB_ID }}
      INTEGRATION_PROJECT_ID: ${{ secrets.INTEGRATION_PROJECT_ID }}
      APS_AUTH_MODE: ssa
      APS_CLIENT_ID: ${{ secrets.APS_CLIENT_ID }}
      APS_CLIENT_SECRET: ${{ secrets.APS_CLIENT_SECRET }}
      SSA_ID: ${{ secrets.SSA_ID }}
      SSA_KEY_ID: ${{ secrets.SSA_KEY_ID }}
      SSA_KEY_PATH: /tmp/ssa-private.pem
      # Not read-only: the smoke tests must exercise the real preview path. Nothing is
      # written — every mutation test runs with dry_run=true, which returns a preview and
      # an approval token without calling APS. FORMA_READONLY=true would short-circuit
      # those tests into a refusal that looks like a pass.
      FORMA_READONLY: 'false'
      # Explicit default: the smoke tests rely on the dry_run/approval_token flow, which
      # only applies in preview_required mode.
      FORMA_MUTATION_MODE: preview_required
      LOG_LEVEL: debug

    steps:
      - name: Check for APS credentials
        id: creds
        run: |
          if [ -n "${{ secrets.APS_CLIENT_ID }}" ] && [ -n "${{ secrets.SSA_ID }}" ] && [ -n "${{ secrets.INTEGRATION_HUB_ID }}" ]; then
            echo 'configured=true' >> "$GITHUB_OUTPUT"
          else
            echo 'configured=false' >> "$GITHUB_OUTPUT"
            echo '::notice::APS credentials and/or INTEGRATION_HUB_ID are not configured in the `integration` environment — skipping live integration tests.'
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.configured == 'true'

      - name: Write SSA private key
        if: steps.creds.outputs.configured == 'true'
        run: echo "${{ secrets.SSA_PRIVATE_KEY }}" > /tmp/ssa-private.pem

      # Version comes from package.json "packageManager" — see the note in the build job.
      - uses: pnpm/action-setup@v4
        if: steps.creds.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.configured == 'true'
        with:
          node-version: '20'
          cache: pnpm

      - if: steps.creds.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.creds.outputs.configured == 'true'
        run: pnpm run build
      - if: steps.creds.outputs.configured == 'true'
        run: pnpm run test -- tests/integration --passWithNoTests
